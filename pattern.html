<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pattern</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #eee;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 50px);
            gap: 5px;
        }
        
        .grid-container div {
            width: 50px;
            height: 50px;
        }
        
        .grid-container div:nth-child(3n+1) {
            background-color: #e98948;
        }
        
        .grid-container div:nth-child(3n+2) {
            background-color: #f1b883;
        }
        
        .grid-container div:nth-child(3n+3) {
            background-color: #9d5a31;
        }
        
        .grid-container div:nth-child(12n+7),
        .grid-container div:nth-child(12n+8),
        .grid-container div:nth-child(12n+9),
        .grid-container div:nth-child(12n+10),
        .grid-container div:nth-child(12n+11),
        .grid-container div:nth-child(12n+12) {}
        
        .grid-container div:nth-child(n+7) {
            filter: hue-rotate(10deg);
        }
        
        .grid-container div:nth-child(6n+1) {
            background-color: #e98948;
        }
        
        .grid-container div:nth-child(6n+2) {
            background-color: #f1b883;
        }
        
        .grid-container div:nth-child(6n+3) {
            background-color: #9d5a31;
        }
        
        .grid-container div:nth-child(6n+4) {
            background-color: #e98948;
        }
        
        .grid-container div:nth-child(6n+5) {
            background-color: #f1b883;
        }
        
        .grid-container div:nth-child(6n+6) {
            background-color: #9d5a31;
        }
        
        .grid-container div:nth-child(12n+7) {
            background-color: #f1b883;
        }
        
        .grid-container div:nth-child(12n+8) {
            background-color: #9d5a31;
        }
        
        .grid-container div:nth-child(12n+9) {
            background-color: #e98948;
        }
        
        .grid-container div:nth-child(12n+10) {
            background-color: #f1b883;
        }
        
        .grid-container div:nth-child(12n+11) {
            background-color: #9d5a31;
        }
        
        .grid-container div:nth-child(12n+12) {
            background-color: #e98948;
        }
    </style>
</head>

<body>

    <div class="grid-container">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

</body>

</html>
