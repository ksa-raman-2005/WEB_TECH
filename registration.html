<!DOCTYPE html>
<html>
<center>
    <h2>Registration form</h2>
    <form>
        <label for="name">Name : </label>
        <input type="text" id="name" name="username">
        <br>
        <br>
        <label for="password">Password : </label>
        <input type="text" id="password" name="password">
        <br>
        <br>
        <label for="DOB">Date of birth : </label>
        <select id="Day" name="Day">
        <option value="01">01</option>
        <option value="02">02</option>
        <option value="03">03</option>
        <option value="04">04</option>
        <option value="05">05</option>
        <option value="06">06</option>
        <option value="07">07</option>
        <option value="08">08</option>
        <option value="09">09</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="13">13</option>
        <option value="14">14</option>
        <option value="15">15</option>
        <option value="16">16</option>
        <option value="17">17</option>
        <option value="18">18</option>
        <option value="19">19</option>
        <option value="20">20</option>
        <option value="21">21</option>
        <option value="22">22</option>
        <option value="23">23</option>
        <option value="24">24</option>
        <option value="25">25</option>
        <option value="26">26</option>
        <option value="27">27</option>
        <option value="28">28</option>
        <option value="29">29</option>
        <option value="30">30</option>
        <option value="31">31</option>
        </select>
        <select id="Month" name="Month">
        <option value="01">Jan</option>
        <option value="02">Feb</option>
        <option value="03">Mar</option>
        <option value="04">Apr</option>
        <option value="05">May</option>
        <option value="06">Jun</option>
        <option value="07">Jul</option>
        <option value="08">Aug</option>
        <option value="09">Sep</option>
        <option value="10">Oct</option>
        <option value="11">Nov</option>
        <option value="12">Dec</option>
       </select>
        <select id="year" name="year">
        <option value="2021">2021</option>
        <option value="2022">2022</option>
        <option value="2023">2023</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
       </select>
        <br>
        <br>
        <label for="Gender">Gender : </label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        <label for="msg">Message : </label>
        <textarea id="msg" name="msg"></textarea>
        <br>
        <label for="Lang">Languages known : </label>
        <input type="checkbox" id="telugu" name="lang" value="telugu">
        <label for="telugu">Telugu </label>
        <input type="checkbox" id="eng" name="lang" value="eng">
        <label for="eng">English</label>
        <input type="checkbox" id="hin" name="lang" value="hin">
        <label for="hin">Hindi</label>
        <br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</center>

</html>
