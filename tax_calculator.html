<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Tax Calculator FY 2025-26</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        
        .calculator-card {
            width: 400px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background-color: #4a90e2;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }
        
        .section {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .section-title {
            font-size: 0.9em;
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 10px;
        }
        
        label {
            display: block;
            font-size: 0.85em;
            color: #333;
            margin-bottom: 5px;
        }
        
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .readonly-input {
            background-color: #f9f9f9;
            color: #666;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background-color: #357abd;
        }
        
        .result-box {
            background-color: #f8f9fc;
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        
        .result-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-bottom: 5px;
            color: #555;
        }
        
        .total-row {
            font-weight: bold;
            color: #333;
            border-top: 1px solid #ddd;
            pt: 5px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="calculator-card">
        <div class="header">Income Tax Calculator</div>

        <div class="section">
            <div class="section-title">Personal Details:</div>
            <input type="text" placeholder="Enter Your Name">
        </div>

        <div class="section">
            <div class="section-title">Income Details:</div>
            <label>Gross Annual Salary:</label>
            <input type="number" id="grossIncome" placeholder="₹">
        </div>

        <div class="section">
            <div class="section-title">Deduction:</div>
            <label>Standard Deduction:</label>
            <input type="text" value="₹ 75,000" class="readonly-input" readonly>
            <button onclick="calculateTax()">Calculate Tax</button>
        </div>

        <div class="section" id="resultSection" style="display:none;">
            <div class="section-title">Result:</div>
            <div class="result-box">
                <div class="result-row"><span>Gross Income:</span> <span id="resGross">₹ 0</span></div>
                <div class="result-row"><span>Standard Deduction:</span> <span>₹ 75,000</span></div>
                <div class="result-row"><span>Taxable Income:</span> <span id="resTaxable">₹ 0</span></div>
                <div class="result-row"><span>Income Tax:</span> <span id="resTax">₹ 0</span></div>
                <div class="result-row"><span>Cess (4%):</span> <span id="resCess">₹ 0</span></div>
                <div class="result-row total-row"><span>Final Tax Payable:</span> <span id="resTotal">₹ 0</span></div>
            </div>
        </div>
    </div>

    <script>
        function calculateTax() {
            const gross = parseFloat(document.getElementById('grossIncome').value) || 0;
            const stdDeduction = 75000;
            const taxableIncome = Math.max(0, gross - stdDeduction);

            let tax = 0;

            if (taxableIncome > 2400000) {
                tax += (taxableIncome - 2400000) * 0.30;
                tax += 400000 * 0.25; // 20-24L
                tax += 400000 * 0.20; // 16-20L
                tax += 400000 * 0.15; // 12-16L
                tax += 400000 * 0.10; // 8-12L
                tax += 400000 * 0.05; // 4-8L
            } else if (taxableIncome > 2000000) {
                tax += (taxableIncome - 2000000) * 0.25;
                tax += 400000 * 0.20;
                tax += 400000 * 0.15;
                tax += 400000 * 0.10;
                tax += 400000 * 0.05;
            } else if (taxableIncome > 1600000) {
                tax += (taxableIncome - 1600000) * 0.20;
                tax += 400000 * 0.15;
                tax += 400000 * 0.10;
                tax += 400000 * 0.05;
            } else if (taxableIncome > 1200000) {
                tax += (taxableIncome - 1200000) * 0.15;
                tax += 400000 * 0.10;
                tax += 400000 * 0.05;
            } else if (taxableIncome > 800000) {
                tax += (taxableIncome - 800000) * 0.10;
                tax += 400000 * 0.05;
            } else if (taxableIncome > 400000) {
                tax += (taxableIncome - 400000) * 0.05;
            }

            if (taxableIncome <= 1200000) {
                tax = 0;
            }

            const cess = tax * 0.04;
            const totalTax = tax + cess;

            document.getElementById('resGross').innerText = "₹ " + gross.toLocaleString();
            document.getElementById('resTaxable').innerText = "₹ " + taxableIncome.toLocaleString();
            document.getElementById('resTax').innerText = "₹ " + tax.toLocaleString();
            document.getElementById('resCess').innerText = "₹ " + cess.toLocaleString();
            document.getElementById('resTotal').innerText = "₹ " + totalTax.toLocaleString();
            document.getElementById('resultSection').style.display = 'block';
        }
    </script>

</body>

</html>
